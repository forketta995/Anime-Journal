<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Stagionale - Anime Journal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" v-cloak>
        <navbar-component></navbar-component>
        <main class="container">
            <h1>{{ titleSeason }}</h1>
            <div class="filter-section">
                <label>Ordina per:</label>
                <select v-model="sortBy">
                    <option value="media">Media Generale</option>
                    <option value="Forketta">Voto Forketta</option>
                    <option value="pigna">Voto Pigna</option>
                </select>
            </div>
            <ul class="anime-grid">
                <li v-for="item in sortedSeasonAnime" :key="item.id" class="anime-card">
                    <div class="score-badge">{{ item.media || '-' }}</div>
                    <div class="anime-info">
                        <div class="anime-header">
                            <strong>{{ item.info.title }}</strong>
                            <span v-if="item.info.note" class="tag-note">{{ item.info.note }}</span>
                        </div>
                        <div class="momenti-container">
                            <span v-if="item.notaCour"><strong>{{ item.notaCour }}:</strong> </span>
                            {{ item.votiTesto || 'Nessun voto' }}
                        </div>
                        <div class="anime-footer">
                            <a :href="'https://anilist.co/anime/' + item.id" target="_blank">AniList</a>
                        </div>
                    </div>
                </li>
            </ul>
        </main>
    </div>
    <script src="js/logic.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
