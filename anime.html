<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Completa - Anime Journal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" v-cloak>
        <navbar-component></navbar-component>
        <main class="container">
            <h1>Tutti gli Anime</h1>
            
            <div class="search-section">
                <input type="text" v-model="searchQuery" placeholder="Cerca un titolo tra quelli visti...">
            </div>

            <div class="filter-section">
                <label>Ordina per:</label>
                <select v-model="sortBy">
                    <option value="media">Media Globale</option>
                    <option value="Forketta">Media Forketta</option>
                    <option value="pigna">Media Pigna</option>
                </select>
            </div>

            <ul class="anime-grid">
                <li v-for="item in filteredGlobalAnime" :key="item.id" class="anime-card">
                    <div class="score-badge">{{ item.globalMedia > 0 ? item.globalMedia : '-' }}</div>
                    
                    <div class="anime-info">
                        <div class="anime-header">
                            <strong>{{ item.info.title }}</strong>
                            <span v-if="item.info.note" class="tag-note">{{ item.info.note }}</span>
                        </div>

                        <div class="momenti-container">
                            {{ item.votiTesto || 'Nessun voto registrato' }}
                        </div>

                        <div class="anime-details">
                            <small>Stagioni registrate: {{ formatSeasonNames(item.info.season) }}</small>
                        </div>

                        <div class="anime-footer">
                            <small>ID AniList: #{{ item.id }}</small>
                            <a :href="'https://anilist.co/anime/' + item.id" target="_blank">Apri AniList</a>
                        </div>
                    </div>
                </li>
            </ul>
        </main>
    </div>
    <script src="js/logic.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
